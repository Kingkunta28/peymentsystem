services:
  - type: web
    name: payment-system-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn payment_system.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "false"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://payment-system-frontend.vercel.app"
      - key: ALLOWED_HOSTS
        value: "payment-system-api.onrender.com,localhost,127.0.0.1"
      - key: DATABASE_URL
        value: "postgresql://neondb_owner:npg_wHNjxl6ogYp3@ep-billowing-mud-aisw7fbl-pooler.c-4.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require"
    disk:
      enabled: false
