services:
  - type: web
    name: payment-system-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn payment_system.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "false"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://payment-system-frontend.vercel.app"
      - key: ALLOWED_HOSTS
        value: "payment-system-api.onrender.com,localhost,127.0.0.1"
    disk:
      enabled: false

  - type: pserv
    name: payment-system-db
    runtime: postgres
    plan: free
    databaseName: payment_system
    databaseUser: payment_system
    databasePassword: ${postgresql.payment_system.password}
    ipAllowList: []
